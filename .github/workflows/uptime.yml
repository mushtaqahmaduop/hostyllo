name: Uptime

# Lightweight BACKUP uptime probe. The PRIMARY external monitor is UptimeRobot (5-min checks on
# /api/v1/ready → email alerts). This runs on GitHub's schedule (which GitHub throttles to roughly
# hourly) purely as a second, independent probe: a failed job emails the repo owner.
#
# It hits /api/v1/ready (readiness — 503 when DB/Redis is down), NOT /health (liveness — always
# 200). No Sentry Crons check-in: GitHub's unreliable scheduler made that monitor flap with false
# "missed check-in" alerts, so cron monitoring now lives in UptimeRobot, not here.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  probe:
    name: Probe /ready
    runs-on: ubuntu-latest
    steps:
      - name: Check production readiness
        env:
          READY_URL: https://hostyllo-production.up.railway.app/api/v1/ready
        run: |
          set +e
          resp=$(curl -s -m 15 -w "\n%{http_code}" "$READY_URL")
          code=$(printf '%s' "$resp" | tail -n1)
          json=$(printf '%s' "$resp" | sed '$d')
          echo "HTTP $code — $json"
          if [ "$code" != "200" ]; then
            echo "::error::Production readiness FAILED (HTTP $code): $json"
            exit 1
          fi
          echo "ready"
